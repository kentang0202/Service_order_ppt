name: Build Windows EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4 # 順便升級到 v4
    
    - name: Set up Python
      uses: actions/setup-python@v5 # 順便升級到 v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install eel python-pptx pyinstaller setuptools
        
    - name: Build EXE with Eel
      run: |
        python -m eel main.py . --onefile --noconsole --name "SundayServicePPT"
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4 # 關鍵修復：改成 v4
      with:
        name: Church-Tool-Windows-Package
        path: dist/SundayServicePPT.exe